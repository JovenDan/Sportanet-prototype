<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sportanet - Plataforma de eventos deportivos">
    <meta name="theme-color" content="#001f3f">
    <title>Sportanet - Inicio</title>

    <!-- Google Fonts: Tomorrow Static -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tomorrow:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tus estilos personalizados -->
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/style.css">

    <style>
        body {
            font-family: 'Tomorrow', sans-serif;
            background: linear-gradient(135deg, #001f3f, #003366);
        }

        .hero {
            min-height: 80vh;
            color: #00FF7F;
            background-size: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero h1 {
            font-weight: 700;
            margin-bottom: 1rem;
        }

        footer {
            background-color: #001f3f;
            color: white;
            padding: 1rem 0;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header dinámico -->
    <div id="header-container"></div>

    <!-- Contenido principal -->
    <main class="flex-fill">

        <section class="hero">
            <div class="container">
                <h1 class="display-4">Bienvenido a Sportanet</h1>
                <p class="lead">
                    La plataforma para encontrar y participar en eventos deportivos
                </p>
                <a href="events.html" class="btn btn-light btn-lg mt-3">
                    Explorar eventos
                </a>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="text-center mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2025 Sportanet - Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script para cargar el header -->
    <script>
        async function loadHeader() {
            const headerContainer = document.getElementById('header-container');
            try {
                const response = await fetch('includes/header.html');
                if (!response.ok) throw new Error('Error al cargar el header');
                
                const html = await response.text();
                headerContainer.innerHTML = html;

                const script = document.createElement("script");
                script.src = "JS/header.js";
                script.onload = () => {
                    if (typeof initHeaderEvents === 'function') {
                        initHeaderEvents();
                    }
                };
                document.body.appendChild(script);

            } catch (error) {
                console.error('Error al cargar el encabezado:', error);
                headerContainer.innerHTML =
                    '<header class="navbar bg-dark text-white p-3"><p class="text-danger mb-0">Error al cargar el menú</p></header>';
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadHeader);
        } else {
            loadHeader();
        }
    </script>

</body>
</html>
