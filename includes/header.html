<!-- AUTH MODAL -->
<div class="modal fade" id="modal-auth" tabindex="-1" aria-labelledby="modalAuthTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content contenedor-logreg">
      <div class="modal-header">
        <h5 class="modal-title" id="modalAuthTitle">Iniciar Sesión</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <!-- LOGIN FORM -->
        <form id="form-login" class="auth-form">
          <div class="mb-3">
            <label for="login-email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="login-email" name="email"
                   placeholder="tu@email.com" required>
            <div class="invalid-feedback" id="error-login-email"></div>
          </div>
          <div class="mb-3">
            <label for="login-password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="login-password" name="password"
                   placeholder="Mínimo 6 caracteres" required>
            <div class="invalid-feedback" id="error-login-password"></div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="btn-submit-login">Ingresar</button>
          <div class="form-text text-center mt-2" id="login-message"></div>
          <p class="text-center mt-3">
            ¿No tienes cuenta?
            <button type="button" id="mostrar-registro" class="btn btn-link p-0">Regístrate aquí</button>
          </p>
        </form>

        <!-- REGISTER FORM -->
        <form id="form-registro" class="auth-form d-none">
          <h5 class="d-none" id="modalRegisterTitle">Crear Cuenta</h5>

          <div class="mb-3">
            <label class="form-label d-block">Tipo de usuario</label>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="userType" value="organizer" id="organizer">
              <label class="form-check-label" for="organizer">Organizador</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="userType" value="athlete" id="athlete">
              <label class="form-check-label" for="athlete">Atleta</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="userType" value="admin" id="admin">
              <label class="form-check-label" for="admin">Admin</label>
            </div>
          </div>

          <div class="mb-3">
            <label for="reg-nombre" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="reg-nombre" name="nombre" placeholder="Juan Pérez" required>
            <div class="invalid-feedback" id="error-reg-nombre"></div>
          </div>
          <div class="mb-3">
            <label for="reg-email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="reg-email" name="email" placeholder="tu@email.com" required>
            <div class="invalid-feedback" id="error-reg-email"></div>
          </div>
          <div class="mb-3">
            <label for="reg-phone" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="reg-phone" name="phone" placeholder="+57 (123) 456-7890" required>
            <div class="invalid-feedback" id="error-reg-phone"></div>
          </div>
          <div class="mb-3">
            <label for="reg-password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="reg-password" name="password"
                   placeholder="Mínimo 6 caracteres" required minlength="6">
            <div class="invalid-feedback" id="error-reg-password"></div>
          </div>
          <div class="mb-3">
            <label for="reg-password-confirm" class="form-label">Confirmar Contraseña</label>
            <input type="password" class="form-control" id="reg-password-confirm" name="password_confirm"
                   placeholder="Repite tu contraseña" required>
            <div class="invalid-feedback" id="error-reg-password-confirm"></div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="btn-submit-registro">Crear Cuenta</button>
          <div class="form-text text-center mt-2" id="registro-message"></div>
          <p class="text-center mt-3">
            ¿Ya tienes cuenta?
            <button type="button" id="mostrar-login" class="btn btn-link p-0">Inicia sesión aquí</button>
          </p>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal fade" id="modal-perfil" tabindex="-1" aria-labelledby="modalPerfilTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalPerfilTitle">Mi Perfil</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <form id="form-editar-perfil" class="profile-form">
          <div class="mb-3">
            <label for="perfil-nombre" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="perfil-nombre" name="nombre"
                   placeholder="Juan Pérez" required readonly>
            <div class="invalid-feedback" id="error-perfil-nombre"></div>
          </div>
          <div class="mb-3">
            <label for="perfil-email" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="perfil-email" name="email"
                   placeholder="tu@email.com" required readonly>
            <div class="invalid-feedback" id="error-perfil-email"></div>
          </div>
          <div class="mb-3">
            <label for="perfil-phone" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="perfil-phone" name="phone"
                   placeholder="+57 (123) 456-7890" required readonly>
            <div class="invalid-feedback" id="error-perfil-phone"></div>
          </div>
          <div id="perfil-readonly-actions" class="mb-3">
            <button type="button" class="btn btn-secondary" id="btn-editar-perfil">Editar Perfil</button>
          </div>
          <div id="perfil-buttons" class="mb-3 d-none">
            <button type="submit" class="btn btn-primary" id="btn-guardar-perfil">Guardar Cambios</button>
            <button type="button" class="btn btn-secondary" id="btn-cancelar-perfil">Cancelar</button>
          </div>
          <div class="form-text text-center mt-2" id="perfil-message"></div>
          <div class="alert alert-danger kt-times margin-top" id="danger-zone"><!-- keep no changes? --></div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal fade" id="modal-confirmar-eliminar" tabindex="-1" aria-labelledby="confirmarTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="confirmarTitle">Confirmar Eliminación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de que deseas eliminar tu cuenta?</p>
        <p class="text-danger"><strong>Esta acción es permanente y no se puede deshacer.</strong></p>
      </div>
      <div class="modal-footer">
        <button id="btn-cancelar-eliminar" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btn-confirmar-eliminar" type="button" class="btn btn-danger">Sí, Eliminar Mi Cuenta</button>
      </div>
    </div>
  </div>
</div>
