<div class="modal fade" id="modal-auth" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Autenticación</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <!-- LOGIN -->
                <form id="form-login" class="auth-form">

                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="login-email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Ingresar
                    </button>

                    <div class="text-center mt-3">
                        <button type="button" id="mostrar-registro"
                            class="btn btn-link p-0">
                            Crear cuenta
                        </button>
                    </div>
                </form>

                <!-- REGISTRO -->
                <form id="form-registro" class="auth-form d-none">

                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="reg-nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="reg-email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="reg-phone" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="reg-password" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" id="reg-password-confirm" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Crear Cuenta
                    </button>

                    <div class="text-center mt-3">
                        <button type="button" id="mostrar-login"
                            class="btn btn-link p-0">
                            Volver al login
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modal-perfil" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Mi Perfil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="form-editar-perfil">

                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="perfil-nombre" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="perfil-email" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="tel" id="perfil-phone" class="form-control" readonly>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-secondary" id="btn-editar-perfil">
                            Editar Perfil
                        </button>
                        <button type="button" class="btn btn-danger" id="btn-eliminar-cuenta">
                            Eliminar Cuenta
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
